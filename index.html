<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="banner">
    <div class="banner-header">
      <img class="logo" src="./assets/img/logo.png" alt="viking helmet logo">
      <h1 class="header">ODIN</h1>
    </div>
    <p class="banner-footer">Photo by <a target="_blank" href="https://unsplash.com/@hynesight?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Jeremy Hynes</a> on <a target="_blank" href="https://unsplash.com/photos/a-glowing-full-moon-in-a-dark-starry-night-sky-6rMK65PSioY?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
  </div>
  <div class="container">
    <div class="above-form">
      <p>Text1</p>
      <p>Text2</p>
    </div>
    <div class="form-container">
      <h2 class="form-header">Let's do this!</h2>
      <form id="signup">
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first-name">
        
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last-name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email">

        <label for="phone-number">Phone Number</label>
        <input type="tel" id="phone-number" name="phone-number">

        <label for="password">Password</label>
        <input type="password" id="password" name="password">

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password">
      </form>
    </div>
    <div class="below-form">
      <button form="signup">Create Account</button>
      <p>Already have an account? <a>Log in</a></p>
    </div>
  </div>
</body>
</html>
