<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="banner">
    <div class="banner-header">
      <img class="logo" src="./assets/img/logo.png" alt="viking helmet logo">
      <h1 class="header">ODIN</h1>
    </div>
    <p class="banner-footer">Photo by <a target="_blank" href="https://unsplash.com/@hynesight?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Jeremy Hynes</a> on <a target="_blank" href="https://unsplash.com/photos/a-glowing-full-moon-in-a-dark-starry-night-sky-6rMK65PSioY?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
  </div>
  <div class="container">
    <div class="above-form">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
      <p>Sign up <em>now</em> to get started.</p>
      <p>You <em>know</em> you want to.</p>
    </div>
    <div class="form-container">
      <h2 class="form-header">Let's do this!</h2>
      <form id="signup" class="signup-form">
        <div class="form-item">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" required>
        </div>
        <div class="form-item">            
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" required>
        </div>
        <div class="form-item">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-item">
          <label for="phone-number">Phone Number</label>
          <input type="tel" id="phone-number" name="phone-number" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
        </div>
        <div class="form-item">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" minlength="8" required>
        </div> 
        <div class="form-item">
          <label for="confirm-password">Confirm Password</label required>
          <input type="password" id="confirm-password" name="confirm-password" minlength="8" required>
        </div>
      </form>
    </div>
    <div class="below-form">
      <button class="submit" form="signup">Create Account</button>
      <p>Already have an account? <a href="">Log in</a></p>
    </div>
  </div>
</body>
</html>
